version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fifa-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fifadb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d fifadb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fifa-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: fifa-fastapi
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:password@db:5432/fifadb
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - API_FOOTBALL_KEY=${API_FOOTBALL_KEY:-your_rapidapi_key_here}
      - API_FOOTBALL_HOST=api-football-v1.p.rapidapi.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
    container_name: fifa-celery-worker
    command: ["celery", "-A", "FastAPI.celery_worker", "worker", "--loglevel=info"]
    environment:
      - DATABASE_URL=postgresql://admin:password@db:5432/fifadb
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: fifa-nextjs
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
